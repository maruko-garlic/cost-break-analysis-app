<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost Break Analysis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      font-size: 17px;
    }
    .header {
      background: #181825; color: #cdd6f4;
      padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #313244;
    }
    .header h1 { font-size: 17px; font-weight: 500; }
    .tab-buttons { display: flex; gap: 8px; }
    .tab-btn {
      border: 1px solid #45475a; background: transparent; color: #a6adc8;
      border-radius: 6px; padding: 5px 14px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .tab-btn.active { background: #cdd6f4; color: #1e1e2e; border-color: #cdd6f4; }
    .tab-btn:hover { background: #313244; color: #cdd6f4; }
    .tab-btn.active:hover { background: #cdd6f4; color: #1e1e2e; }
    .content { padding: 1.5rem 1rem; max-width: 680px; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; }
    .section {
      background: #181825; border: 1px solid #313244;
      border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; color: #cdd6f4; }
    .note { font-size: 13px; color: #6c7086; margin-bottom: 1.5rem; }
    .label { font-size: 14px; color: #bac2de; margin-bottom: 4px; font-weight: 500; }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
    .unit { font-size: 14px; color: #a6adc8; }
    input[type="text"], input[type="number"] {
      padding: 8px 10px; border: 1px solid #45475a; border-radius: 6px;
      font-size: 15px; background: #2a2a3e; color: #cdd6f4; font-family: inherit;
    }
    input[type="text"] { width: 100%; }
    input[type="number"] { width: 150px; }
    input:focus { outline: 2px solid #89b4fa; }
    input::placeholder { color: #9099b8; }
    .process-block {
      background: #24273a; border: 1px solid #313244;
      border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;
    }
    .process-title {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; color: #cdd6f4;
    }
    .process-name-display { font-size: 14px; color: #a6adc8; font-weight: 400; }
    .cost-display {
      font-size: 13px; color: #a6adc8;
      margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #313244;
    }
    .cost-value { font-size: 15px; font-weight: 500; color: #a6e3a1; }
    .product-block {
      background: #1e2a3a; border: 1px solid #2a4060;
      border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;
    }
    .product-title {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; color: #89b4fa;
    }
    .yield-box {
      background: #2a2520; border: 1px solid #4a3f20;
      border-radius: 8px; padding: 1rem; margin-bottom: 1rem;
    }
    .yield-label { font-size: 13px; color: #a6adc8; margin-bottom: 4px; }
    .yield-value { font-size: 22px; font-weight: 500; color: #f9e2af; }
    .yield-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .yield-item { flex: 1; min-width: 120px; }
    button {
      border: 1px solid #45475a; background: #24273a; border-radius: 6px;
      padding: 6px 14px; font-size: 13px; cursor: pointer;
      color: #cdd6f4; font-family: inherit;
    }
    button:hover { background: #313244; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-add { margin-bottom: 1rem; }
    .btn-remove { font-size: 12px; padding: 3px 10px; color: #6c7086; }
    .btn-register {
      background: #89b4fa; color: #1e1e2e; border-color: #89b4fa;
      padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 0.5rem;
      font-weight: 500;
    }
    .btn-register:hover { background: #b4d0fb; }
    .btn-update {
      background: #a6e3a1; color: #1e1e2e; border-color: #a6e3a1;
      padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 0.5rem;
      font-weight: 500;
    }
    .btn-update:hover { background: #c5f0c2; }
    .btn-cancel {
      padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 0.5rem;
    }
    .divider { border: none; border-top: 1px solid #313244; margin: 1rem 0; }
    .result { background: #24273a; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #313244; }
    .result-label { font-size: 13px; color: #a6adc8; margin-bottom: 4px; }
    .result-value { font-size: 28px; font-weight: 500; color: #a6e3a1; }
    .edit-banner {
      background: #2a2520; border: 1px solid #4a3f20;
      border-radius: 8px; padding: 0.75rem 1rem;
      margin-bottom: 1rem; font-size: 14px; color: #f9e2af;
      display: none;
    }
    .edit-banner.show { display: block; }
    .search-box { margin-bottom: 1rem; }
    .search-box input {
      width: 100%; padding: 9px 12px;
      border: 1px solid #45475a; border-radius: 8px;
      font-size: 15px; background: #24273a; color: #cdd6f4;
      font-family: inherit;
    }
    .search-box input:focus { outline: 2px solid #89b4fa; }
    .search-box input::placeholder { color: #585b70; }
    .ledger-empty { text-align: center; color: #45475a; padding: 2rem; font-size: 14px; }
    .ledger-item {
      background: #181825; border: 1px solid #313244;
      border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ledger-item-left { flex: 1; }
    .ledger-product-name { font-size: 16px; font-weight: 500; margin-bottom: 3px; color: #cdd6f4; }
    .ledger-meta { font-size: 13px; color: #a6adc8; margin-bottom: 3px; }
    .ledger-cost { font-size: 18px; font-weight: 500; color: #a6e3a1; }
    .ledger-yield { font-size: 13px; color: #f9e2af; margin-top: 2px; }
    .ledger-date { font-size: 13px; color: #6c7086; margin-top: 3px; }
    .ledger-registrant { font-size: 13px; color: #89b4fa; margin-top: 2px; }
    .ledger-item-right { display: flex; gap: 6px; flex-direction: column; align-items: flex-end; }
    .btn-view { font-size: 12px; padding: 4px 12px; }
    .btn-edit-item { font-size: 12px; padding: 4px 12px; color: #a6e3a1; border-color: #2a4a30; }
    .btn-edit-item:hover { background: #1e3025; }
    .btn-delete { font-size: 12px; padding: 4px 12px; color: #f38ba8; border-color: #4a2030; }
    .btn-delete:hover { background: #2a1020; }
    .modal-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      justify-content: center; align-items: flex-start;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e1e2e; border: 1px solid #313244; border-radius: 12px;
      padding: 1.5rem; width: 100%; max-width: 600px;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .modal-title { font-size: 16px; font-weight: 500; color: #cdd6f4; }
    .btn-close { font-size: 18px; padding: 2px 10px; border: none; background: none; cursor: pointer; color: #6c7086; }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #a6e3a1; color: #1e1e2e; padding: 10px 24px;
      border-radius: 8px; font-size: 14px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s; z-index: 200;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .pw-overlay {
      display: flex; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1e1e2e; z-index: 300;
      justify-content: center; align-items: center;
    }
    .pw-overlay.hidden { display: none; }
    .pw-box {
      background: #181825; border: 1px solid #313244;
      border-radius: 14px; padding: 2.5rem 2rem;
      width: 100%; max-width: 340px; text-align: center;
    }
    .pw-title { font-size: 17px; font-weight: 500; color: #cdd6f4; margin-bottom: 0.4rem; }
    .pw-sub { font-size: 13px; color: #6c7086; margin-bottom: 1.75rem; }
    .pw-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #45475a; border-radius: 8px;
      font-size: 16px; background: #2a2a3e; color: #cdd6f4;
      text-align: center; letter-spacing: 4px;
      font-family: inherit; margin-bottom: 1rem;
    }
    .pw-input:focus { outline: 2px solid #89b4fa; }
    .pw-btn {
      width: 100%; background: #89b4fa; color: #1e1e2e;
      border: none; border-radius: 8px;
      padding: 11px; font-size: 14px; cursor: pointer;
      font-family: inherit; font-weight: 500;
    }
    .pw-btn:hover { background: #b4d0fb; }
    .pw-error { font-size: 13px; color: #f38ba8; margin-top: 0.75rem; min-height: 18px; }
    .loading { text-align: center; color: #45475a; padding: 2rem; font-size: 14px; }
    .fp-rate-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    .fp-rate-table th {
      font-size: 13px; color: #a6adc8; font-weight: 500;
      padding: 6px 8px; border-bottom: 1px solid #313244; text-align: left;
    }
    .fp-rate-table td {
      font-size: 14px; color: #cdd6f4;
      padding: 6px 8px; border-bottom: 1px solid #1e1e2e;
    }
    .fp-rate-table tr:last-child td { border-bottom: none; }
    .fp-rate-pct { color: #f9e2af; font-weight: 500; }
    .fp-rate-loss td { color: #f38ba8; }
  </style>
</head>
<body>

  <div class="pw-overlay" id="pw-overlay">
    <div class="pw-box">
      <div class="pw-title">生産コストブレイク</div>
      <div class="pw-sub">パスワードを入力してください</div>
      <input class="pw-input" type="password" id="pw-input" placeholder="••••••"
        onkeydown="if(event.key==='Enter') checkPassword()">
      <button class="pw-btn" onclick="checkPassword()">ログイン</button>
      <div class="pw-error" id="pw-error"></div>
    </div>
  </div>

  <div class="header">
    <h1>生産コストブレイク</h1>
    <div class="tab-buttons">
      <button class="tab-btn" onclick="showScreen('register', this)">新規登録</button>
      <button class="tab-btn active" onclick="showScreen('ledger', this)">原価台帳</button>
    </div>
  </div>

  <div class="content">

    <div class="screen" id="screen-register"></div>

      <div class="edit-banner" id="edit-banner">
        ✏️ 編集モード：内容を修正して「更新する」を押してください
      </div>

      <p class="note">※ 入力欄に直接入力してください</p>

      <div class="section">
        <h2>製品名 / 作業全体の名称</h2>
        <div class="label">製品名（必須）</div>
        <input type="text" id="product-name" placeholder="例: ○○製品 製造工程">
      </div>

      <div class="section">
        <h2>基本設定</h2>
        <div class="label">原料名</div>
        <div style="margin-bottom:0.75rem;">
          <input type="text" id="material-name" placeholder="例: ○○原料">
        </div>
        <div class="label">基本原料数（投入量）</div>
        <div class="input-row">
          <input type="number" id="base-qty" min="0" step="0.1" placeholder="例: 100" oninput="calc()">
          <span class="unit">kg</span>
        </div>
      </div>

      <div class="section">
        <h2>作業工程（最大6工程）</h2>
        <div id="processes"></div>
        <button class="btn-add" onclick="addProcess()" id="add-btn">＋ 工程を追加</button>
        <hr class="divider">
        <div class="result">
          <div class="result-label">生産コスト合計</div>
          <div class="result-value" id="total">— 円/kg</div>
        </div>
      </div>

      <div class="section">
        <h2>完成品 と 歩留まり</h2>
        <p style="font-size:13px;color:#a6adc8;margin-bottom:1rem;">
          各工程を経て得られた完成品を入力すると、歩留まりが自動計算されます
        </p>
        <div id="finished-products"></div>
        <button class="btn-add" onclick="addFinishedProduct()" id="add-fp-btn">＋ 完成品を追加</button>
        <hr class="divider">
        <div class="yield-box">
          <div class="yield-row">
            <div class="yield-item">
              <div class="yield-label">投入量</div>
              <div class="yield-value" id="yield-input">—</div>
            </div>
            <div class="yield-item">
              <div class="yield-label">完成品合計</div>
              <div class="yield-value" id="yield-output">—</div>
            </div>
            <div class="yield-item">
              <div class="yield-label">ロス</div>
              <div class="yield-value" id="yield-loss">—</div>
            </div>
            <div class="yield-item">
              <div class="yield-label">歩留まり</div>
              <div class="yield-value" id="yield-rate">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>登録者名</h2>
        <div class="label">登録者名（必須・フルネーム）</div>
        <input type="text" id="registrant-name" placeholder="例: 山田 太郎">
      </div>

      <div id="form-buttons">
        <button class="btn-register" onclick="registerProduct()">この内容を登録する</button>
      </div>

    </div>

    <div class="screen active" id="screen-ledger"></div>
      <h2 style="margin-bottom:1rem;">原価台帳</h2>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 製品名・原料名・登録者名で検索" oninput="renderLedger()">
      </div>
      <div id="ledger-list">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">詳細</div>
        <button class="btn-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div id="modal-body"></div>
<button class="btn-cancel" style="width:100%;margin-top:1rem;padding:12px;font-size:16px;" onclick="closeModalDirect()">閉じる</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwTHHmRC8bxBP3IasciPS02I02B4XaAKyX1NSosB_MIvZaz9cSGxxP2WUy6K4Tb7Byp/exec';

    async function checkPassword() {
      const input = document.getElementById('pw-input').value;
      try {
        const result = await postToGAS({ action: 'login', password: input });
        if (result.ok) {
          document.getElementById('pw-overlay').classList.add('hidden');
          sessionStorage.setItem('cba-auth', '1');
        } else {
          document.getElementById('pw-error').textContent = 'パスワードが違います';
          document.getElementById('pw-input').value = '';
          document.getElementById('pw-input').focus();
        }
      } catch(e) {
        document.getElementById('pw-error').textContent = '通信エラーが発生しました';
      }
    }

    if (sessionStorage.getItem('cba-auth') === '1') {
      document.getElementById('pw-overlay').classList.add('hidden');
    }

    // ===== データ取得・送信 =====
    async function loadItems() {
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        return Array.isArray(data) ? data : [];
      } catch(e) {
        console.error('データ取得エラー:', e);
        return [];
      }
    }

    async function postToGAS(payload) {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      return await res.json();
    }

    let processSeq = 0;
    let fpSeq = 0;
    let editingId = null;

    function showScreen(name, btn) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (name === 'ledger') renderLedger();
    }

    function addProcess() {
      const current = document.querySelectorAll('.process-block').length;
      if (current >= 6) return;
      processSeq++;
      const id = processSeq;
      const displayNum = current + 1;
      const div = document.createElement('div');
      div.className = 'process-block';
      div.id = 'process-' + id;
      div.innerHTML = `
        <div class="process-title">
          <span>工程 <span class="process-num" id="pnum-${id}">${displayNum}</span>　<span class="process-name-display" id="name-display-${id}"></span></span>
          <button class="btn-remove" onclick="removeProcess(${id})">削除</button>
        </div>
        <div class="label">工程名</div>
        <div style="margin-bottom:0.75rem;">
          <input type="text" id="process-name-${id}" placeholder="例: 洗浄・混合・加熱 など"
            oninput="document.getElementById('name-display-${id}').textContent = this.value ? '／ ' + this.value : ''">
        </div>
        <div class="label">作業者数</div>
        <div class="input-row">
          <input type="number" id="workers-${id}" min="0" step="1" placeholder="例: 3" oninput="calc()">
          <span class="unit">人</span>
        </div>
        <div class="label">作業時間</div>
        <div class="input-row">
          <input type="number" id="hours-${id}" min="0" step="0.1" placeholder="例: 8" oninput="calc()">
          <span class="unit">h</span>
        </div>
        <div class="label">基本賃金</div>
        <div class="input-row">
          <input type="number" id="wage-${id}" min="0" step="1" placeholder="例: 1000" oninput="calc()">
          <span class="unit">円/h</span>
        </div>
        <div class="cost-display">
          この工程の生産コスト：<span class="cost-value" id="cost-${id}">—</span>
        </div>`;
      document.getElementById('processes').appendChild(div);
      if (document.querySelectorAll('.process-block').length >= 6) {
        document.getElementById('add-btn').disabled = true;
      }
      calc();
    }

    function removeProcess(id) {
      document.getElementById('process-' + id)?.remove();
      document.querySelectorAll('.process-block').forEach((block, index) => {
        const numEl = block.querySelector('.process-num');
        if (numEl) numEl.textContent = index + 1;
      });
      document.getElementById('add-btn').disabled = false;
      calc();
    }

    function addFinishedProduct() {
      const current = document.querySelectorAll('.product-block').length;
      fpSeq++;
      const id = fpSeq;
      const displayNum = current + 1;
      const div = document.createElement('div');
      div.className = 'product-block';
      div.id = 'fp-' + id;
      div.innerHTML = `
        <div class="product-title">
          <span>完成品 <span class="fp-num" id="fpnum-${id}">${displayNum}</span></span>
          <button class="btn-remove" onclick="removeFinishedProduct(${id})">削除</button>
        </div>
        <div class="label">完成品名</div>
        <div style="margin-bottom:0.75rem;">
          <input type="text" id="fp-name-${id}" placeholder="例: ○○製品A">
        </div>
        <div class="label">完成品量</div>
        <div class="input-row">
          <input type="number" id="fp-qty-${id}" min="0" step="0.1" placeholder="例: 50" oninput="calcYield()">
          <span class="unit">kg</span>
        </div>`;
      document.getElementById('finished-products').appendChild(div);
      calcYield();
    }

    function removeFinishedProduct(id) {
      document.getElementById('fp-' + id)?.remove();
      document.querySelectorAll('.product-block').forEach((block, index) => {
        const numEl = block.querySelector('.fp-num');
        if (numEl) numEl.textContent = index + 1;
      });
      calcYield();
    }

    function calc() {
      const baseQty = parseFloat(document.getElementById('base-qty').value);
      let total = 0;
      document.querySelectorAll('.process-block').forEach(block => {
        const id = block.id.split('-')[1];
        const w  = parseFloat(document.getElementById('workers-' + id)?.value);
        const h  = parseFloat(document.getElementById('hours-'   + id)?.value);
        const wg = parseFloat(document.getElementById('wage-'    + id)?.value);
        const costEl = document.getElementById('cost-' + id);
        if (!isNaN(w) && w > 0 && !isNaN(h) && h > 0 && !isNaN(wg) && wg > 0 && !isNaN(baseQty) && baseQty > 0) {
          const cost = (w * h * wg) / baseQty;
          costEl.textContent = cost.toFixed(2) + ' 円/kg';
          total += cost;
        } else {
          costEl.textContent = '—';
        }
      });
      document.getElementById('total').textContent = total > 0 ? total.toFixed(2) + ' 円/kg' : '— 円/kg';
      calcYield();
      return total;
    }

    function calcYield() {
      const baseQty = parseFloat(document.getElementById('base-qty').value) || 0;
      let outputTotal = 0;
      document.querySelectorAll('.product-block').forEach(block => {
        const id = block.id.split('-')[1];
        const qty = parseFloat(document.getElementById('fp-qty-' + id)?.value) || 0;
        outputTotal += qty;
      });
      document.getElementById('yield-input').textContent  = baseQty > 0 ? baseQty.toFixed(1) + ' kg' : '—';
      document.getElementById('yield-output').textContent = outputTotal > 0 ? outputTotal.toFixed(1) + ' kg' : '—';
      if (baseQty > 0 && outputTotal > 0) {
        const loss = baseQty - outputTotal;
        const rate = (outputTotal / baseQty) * 100;
        document.getElementById('yield-loss').textContent = loss.toFixed(1) + ' kg';
        document.getElementById('yield-rate').textContent = rate.toFixed(1) + ' %';
      } else {
        document.getElementById('yield-loss').textContent = '—';
        document.getElementById('yield-rate').textContent = '—';
      }
    }

    function collectFinishedProducts() {
      const fps = [];
      document.querySelectorAll('.product-block').forEach(block => {
        const id = block.id.split('-')[1];
        fps.push({
          name: document.getElementById('fp-name-' + id)?.value || '',
          qty:  parseFloat(document.getElementById('fp-qty-'  + id)?.value) || 0,
        });
      });
      return fps;
    }

    function collectProcesses() {
      const processes = [];
      document.querySelectorAll('.process-block').forEach(block => {
        const id = block.id.split('-')[1];
        processes.push({
          name:    document.getElementById('process-name-' + id)?.value || '',
          workers: parseFloat(document.getElementById('workers-' + id)?.value) || 0,
          hours:   parseFloat(document.getElementById('hours-'   + id)?.value) || 0,
          wage:    parseFloat(document.getElementById('wage-'    + id)?.value) || 0,
        });
      });
      return processes;
    }

    async function registerProduct() {
      const productName = document.getElementById('product-name').value.trim();
      if (!productName) { alert('製品名を入力してください'); return; }
      const baseQty = parseFloat(document.getElementById('base-qty').value);
      if (!baseQty || baseQty <= 0) { alert('基本原料数を入力してください'); return; }
      const registrantName = document.getElementById('registrant-name').value.trim();
      if (!registrantName) { alert('登録者名を入力してください（フルネーム）'); return; }

      const fps = collectFinishedProducts();
      const outputTotal = fps.reduce((s, f) => s + f.qty, 0);
      const yieldRate = baseQty > 0 && outputTotal > 0 ? (outputTotal / baseQty) * 100 : null;

      const data = {
        id: Date.now().toString(),
        productName,
        materialName: document.getElementById('material-name').value,
        baseQty,
        processes: collectProcesses(),
        finishedProducts: fps,
        outputTotal,
        yieldRate,
        totalCost: calc(),
        registrantName,
        registeredAt: new Date().toLocaleString('ja-JP'),
        updatedAt: null,
      };

      try {
        showToast('登録中...');
        const result = await postToGAS({ action: 'register', data });
        if (result.ok) {
          showToast('「' + productName + '」を登録しました！');
          resetForm();
        } else {
          alert('登録に失敗しました：' + result.error);
        }
      } catch(e) {
        alert('通信エラーが発生しました');
      }
    }

    async function updateProduct() {
      const productName = document.getElementById('product-name').value.trim();
      if (!productName) { alert('製品名を入力してください'); return; }
      const baseQty = parseFloat(document.getElementById('base-qty').value);
      if (!baseQty || baseQty <= 0) { alert('基本原料数を入力してください'); return; }
      const registrantName = document.getElementById('registrant-name').value.trim();
      if (!registrantName) { alert('登録者名を入力してください（フルネーム）'); return; }

      const fps = collectFinishedProducts();
      const outputTotal = fps.reduce((s, f) => s + f.qty, 0);
      const yieldRate = baseQty > 0 && outputTotal > 0 ? (outputTotal / baseQty) * 100 : null;

      const data = {
        id: editingId,
        productName,
        materialName: document.getElementById('material-name').value,
        baseQty,
        processes: collectProcesses(),
        finishedProducts: fps,
        outputTotal,
        yieldRate,
        totalCost: calc(),
        registrantName,
        registeredAt: new Date().toLocaleString('ja-JP'),
        updatedAt: new Date().toLocaleString('ja-JP'),
      };

      try {
        showToast('更新中...');
        const result = await postToGAS({ action: 'update', data });
        if (result.ok) {
          showToast('「' + productName + '」を更新しました！');
          resetForm();
        } else {
          alert('更新に失敗しました：' + result.error);
        }
      } catch(e) {
        alert('通信エラーが発生しました');
      }
    }

    async function editItem(id) {
      showToast('データを読み込み中...');
      const items = await loadItems();
      const itemData = items.find(i => String(i.id) === String(id));
      if (!itemData) return;

      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-register').classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[0].classList.add('active');

      resetForm(false);
      editingId = id;

      document.getElementById('product-name').value    = itemData.productName;
      document.getElementById('material-name').value   = itemData.materialName || '';
      document.getElementById('base-qty').value        = itemData.baseQty;
      document.getElementById('registrant-name').value = itemData.registrantName || '';

      document.getElementById('processes').innerHTML = '';
      document.getElementById('add-btn').disabled = false;
      itemData.processes.forEach(p => {
        addProcess();
        const lastBlock = document.querySelector('#processes .process-block:last-child');
        const pid = lastBlock.id.split('-')[1];
        document.getElementById('process-name-' + pid).value = p.name;
        document.getElementById('name-display-'  + pid).textContent = p.name ? '／ ' + p.name : '';
        document.getElementById('workers-' + pid).value = p.workers;
        document.getElementById('hours-'   + pid).value = p.hours;
        document.getElementById('wage-'    + pid).value = p.wage;
      });

      document.getElementById('finished-products').innerHTML = '';
      (itemData.finishedProducts || []).forEach(fp => {
        addFinishedProduct();
        const lastFP = document.querySelector('#finished-products .product-block:last-child');
        const fid = lastFP.id.split('-')[1];
        document.getElementById('fp-name-' + fid).value = fp.name;
        document.getElementById('fp-qty-'  + fid).value = fp.qty;
      });

      calc();
      calcYield();

      document.getElementById('edit-banner').classList.add('show');
      document.getElementById('form-buttons').innerHTML = `
        <button class="btn-update" onclick="updateProduct()">✏️ 更新する</button>
        <button class="btn-cancel" onclick="cancelEdit()">キャンセル</button>
      `;
    }

    function cancelEdit() { resetForm(); }

    function resetForm(resetEditId = true) {
      document.getElementById('product-name').value    = '';
      document.getElementById('material-name').value   = '';
      document.getElementById('base-qty').value        = '';
      document.getElementById('registrant-name').value = '';
      document.getElementById('processes').innerHTML = '';
      document.getElementById('finished-products').innerHTML = '';
      document.getElementById('total').textContent = '— 円/kg';
      document.getElementById('yield-input').textContent  = '—';
      document.getElementById('yield-output').textContent = '—';
      document.getElementById('yield-loss').textContent   = '—';
      document.getElementById('yield-rate').textContent   = '—';
      processSeq = 0;
      fpSeq = 0;
      document.getElementById('add-btn').disabled = false;
      document.getElementById('edit-banner').classList.remove('show');
      document.getElementById('form-buttons').innerHTML =
        `<button class="btn-register" onclick="registerProduct()">この内容を登録する</button>`;
      if (resetEditId) editingId = null;
      addProcess();
    }

    async function renderLedger() {
      const list = document.getElementById('ledger-list');
      list.innerHTML = '<div class="loading">読み込み中...</div>';
      const keyword = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
      let items = await loadItems();

      if (keyword) {
        items = items.filter(item =>
          (item.productName || '').toLowerCase().includes(keyword) ||
          (item.materialName || '').toLowerCase().includes(keyword) ||
          (item.registrantName || '').toLowerCase().includes(keyword)
        );
      }

      if (items.length === 0) {
        list.innerHTML = '<div class="ledger-empty">' + (keyword ? '該当する登録がありません' : 'まだ登録されていません') + '</div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const yieldStr   = item.yieldRate != null ? '歩留まり：' + item.yieldRate.toFixed(1) + '%' : '';
        const updatedStr = item.updatedAt ? '　更新：' + item.updatedAt : '';
        const registrantStr = item.registrantName ? item.registrantName : '—';
        return `
          <div class="ledger-item">
            <div class="ledger-item-left">
              <div class="ledger-product-name">${item.productName}</div>
              <div class="ledger-meta">原料：${item.materialName || '—'} ／ 投入：${item.baseQty}kg</div>
              <div class="ledger-cost">${item.totalCost.toFixed(2)} 円/kg</div>
              ${yieldStr ? '<div class="ledger-yield">' + yieldStr + '</div>' : ''}
              <div class="ledger-date">登録：${item.registeredAt}${updatedStr}</div>
              <div class="ledger-registrant">登録者：${registrantStr}</div>
            </div>
            <div class="ledger-item-right">
              <button class="btn-view"      onclick="viewDetail('${item.id}')">詳細</button>
              <button class="btn-edit-item" onclick="editItem('${item.id}')">編集</button>
              <button class="btn-delete"    onclick="deleteItem('${item.id}')">削除</button>
            </div>
          </div>`;
      }).join('');
    }

    async function viewDetail(id) {
      const items = await loadItems();
      const item = items.find(i => i.id === id);
      if (!item) return;

      document.getElementById('modal-title').textContent = item.productName;

      const processHTML = item.processes.map((p, i) => {
        const cost = item.baseQty > 0 ? (p.workers * p.hours * p.wage) / item.baseQty : 0;
        return `
          <div class="process-block" style="margin-bottom:0.5rem;">
            <div style="font-size:15px;font-weight:500;margin-bottom:0.5rem;color:#cdd6f4;">
              工程${i+1}${p.name ? '　／　' + p.name : ''}
            </div>
            <div style="font-size:14px;color:#a6adc8;line-height:2;">
              作業者数：${p.workers}人　／　作業時間：${p.hours}h　／　基本賃金：${p.wage}円/h
            </div>
            <div class="cost-display">
              この工程の生産コスト：<span class="cost-value">${cost.toFixed(2)} 円/kg</span>
            </div>
          </div>`;
      }).join('');

      let fpHTML = '';
      if ((item.finishedProducts || []).length > 0) {
        const baseQty = item.baseQty;
        const fpRows = item.finishedProducts.map((fp, i) => {
          const pct = baseQty > 0 ? ((fp.qty / baseQty) * 100).toFixed(1) : '—';
          return `
            <tr>
              <td>${fp.name || '完成品' + (i+1)}</td>
              <td>${fp.qty} kg</td>
              <td class="fp-rate-pct">${pct}%</td>
            </tr>`;
        }).join('');

        const loss = baseQty - item.outputTotal;
        const lossPct = baseQty > 0 ? ((loss / baseQty) * 100).toFixed(1) : '—';

        fpHTML = `
          <div class="section" style="margin-bottom:0.75rem;">
            <h2>完成品</h2>
            <table class="fp-rate-table">
              <thead>
                <tr><th>品名</th><th>数量</th><th>割合</th></tr>
              </thead>
              <tbody>
                ${fpRows}
                <tr class="fp-rate-loss">
                  <td>ロス</td>
                  <td>${loss.toFixed(1)} kg</td>
                  <td class="fp-rate-pct">${lossPct}%</td>
                </tr>
              </tbody>
            </table>
            <div class="yield-box" style="margin-top:0.75rem;">
              <div class="yield-row">
                <div class="yield-item"><div class="yield-label">投入量</div><div class="yield-value">${item.baseQty} kg</div></div>
                <div class="yield-item"><div class="yield-label">完成品合計</div><div class="yield-value">${item.outputTotal.toFixed(1)} kg</div></div>
                <div class="yield-item"><div class="yield-label">ロス</div><div class="yield-value">${loss.toFixed(1)} kg</div></div>
                <div class="yield-item"><div class="yield-label">歩留まり</div><div class="yield-value">${item.yieldRate != null ? item.yieldRate.toFixed(1) + ' %' : '—'}</div></div>
              </div>
            </div>
          </div>`;
      }

      document.getElementById('modal-body').innerHTML = `
        <div class="section" style="margin-bottom:0.75rem;">
          <div class="label">原料名</div>
          <div style="font-size:15px;margin-bottom:0.75rem;color:#cdd6f4;">${item.materialName || '—'}</div>
          <div class="label">基本原料数（投入量）</div>
          <div style="font-size:15px;color:#cdd6f4;">${item.baseQty} kg</div>
        </div>
        ${processHTML}
        <div class="result">
          <div class="result-label">生産コスト合計</div>
          <div class="result-value">${item.totalCost.toFixed(2)} 円/kg</div>
        </div>
        ${fpHTML}`;

      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal-overlay'))
        document.getElementById('modal-overlay').classList.remove('open');
    }
    function closeModalDirect() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    async function deleteItem(id) {
      if (!confirm('この登録を削除しますか？')) return;
      try {
        showToast('削除中...');
        const result = await postToGAS({ action: 'delete', id });
        if (result.ok) {
          showToast('削除しました');
          renderLedger();
        } else {
          alert('削除に失敗しました：' + result.error);
        }
      } catch(e) {
        alert('通信エラーが発生しました');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    renderLedger();
    addProcess();
  </script>

</body>
</html>
