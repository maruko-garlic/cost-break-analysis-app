<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost Break Analysis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f5f5f0;
      color: #222;
      font-size: 15px;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: #222; color: #fff;
      padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header h1 { font-size: 17px; font-weight: 500; }
    .tab-buttons { display: flex; gap: 8px; }
    .tab-btn {
      border: 1px solid #555; background: transparent; color: #ccc;
      border-radius: 6px; padding: 5px 14px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .tab-btn.active { background: #fff; color: #222; border-color: #fff; }
    .tab-btn:hover { background: #444; color: #fff; }
    .tab-btn.active:hover { background: #fff; color: #222; }

    /* ===== コンテンツ ===== */
    .content { padding: 1.5rem 1rem; max-width: 680px; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== カード ===== */
    .section {
      background: #fff; border: 1px solid #e0e0d8;
      border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: #444; }
    .note { font-size: 12px; color: #888; margin-bottom: 1.5rem; }
    .label { font-size: 12px; color: #888; margin-bottom: 3px; }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
    .unit { font-size: 13px; color: #888; }

    /* ===== 入力欄（黄色 = 入力箇所） ===== */
    input[type="text"], input[type="number"] {
      padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 14px; background: #fffbe6; color: #222; font-family: inherit;
    }
    input[type="text"] { width: 100%; }
    input[type="number"] { width: 150px; }
    input:focus { outline: 2px solid #aaa; }

    /* ===== 工程ブロック ===== */
    .process-block {
      background: #f9f9f6; border: 1px solid #e0e0d8;
      border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;
    }
    .process-title {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; color: #333;
    }
    .process-name-display { font-size: 13px; color: #555; font-weight: 400; }
    .cost-display {
      font-size: 12px; color: #888;
      margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #e0e0d8;
    }
    .cost-value { font-size: 15px; font-weight: 500; color: #222; }

    /* ===== 完成品ブロック ===== */
    .product-block {
      background: #f0f7ff; border: 1px solid #c8dff8;
      border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;
    }
    .product-title {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; color: #336;
    }

    /* ===== 歩留まり表示 ===== */
    .yield-box {
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 8px; padding: 1rem; margin-bottom: 1rem;
    }
    .yield-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .yield-value { font-size: 22px; font-weight: 500; color: #b8860b; }
    .yield-detail { font-size: 12px; color: #888; margin-top: 4px; }
    .yield-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .yield-item { flex: 1; min-width: 120px; }

    /* ===== ボタン ===== */
    button {
      border: 1px solid #ccc; background: #fff; border-radius: 6px;
      padding: 6px 14px; font-size: 13px; cursor: pointer;
      color: #333; font-family: inherit;
    }
    button:hover { background: #f0f0ec; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-add { margin-bottom: 1rem; }
    .btn-remove { font-size: 12px; padding: 3px 10px; color: #999; }
    .btn-register {
      background: #222; color: #fff; border-color: #222;
      padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 0.5rem;
    }
    .btn-register:hover { background: #444; }
    .btn-update {
      background: #1a5c2a; color: #fff; border-color: #1a5c2a;
      padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 0.5rem;
    }
    .btn-update:hover { background: #227a38; }
    .btn-cancel {
      padding: 10px 24px; font-size: 14px; width: 100%; margin-top: 0.5rem;
    }

    /* ===== 合計・結果 ===== */
    .divider { border: none; border-top: 1px solid #e0e0d8; margin: 1rem 0; }
    .result { background: #f0f0ec; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .result-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .result-value { font-size: 28px; font-weight: 500; color: #222; }

    /* ===== 編集中バナー ===== */
    .edit-banner {
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 8px; padding: 0.75rem 1rem;
      margin-bottom: 1rem; font-size: 13px; color: #7a6000;
      display: none;
    }
    .edit-banner.show { display: block; }

    /* ===== 台帳 ===== */
    .ledger-empty { text-align: center; color: #aaa; padding: 2rem; font-size: 14px; }
    .ledger-item {
      background: #fff; border: 1px solid #e0e0d8;
      border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ledger-item-left { flex: 1; }
    .ledger-product-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
    .ledger-meta { font-size: 12px; color: #888; margin-bottom: 3px; }
    .ledger-cost { font-size: 18px; font-weight: 500; color: #222; }
    .ledger-yield { font-size: 12px; color: #b8860b; margin-top: 2px; }
    .ledger-date { font-size: 11px; color: #bbb; margin-top: 3px; }
    .ledger-item-right { display: flex; gap: 6px; flex-direction: column; align-items: flex-end; }
    .btn-view { font-size: 12px; padding: 4px 12px; }
    .btn-edit-item { font-size: 12px; padding: 4px 12px; color: #1a5c2a; border-color: #a8d8b4; }
    .btn-edit-item:hover { background: #f0fff4; }
    .btn-delete { font-size: 12px; padding: 4px 12px; color: #c00; border-color: #fcc; }
    .btn-delete:hover { background: #fff0f0; }

    /* ===== モーダル ===== */
    .modal-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      justify-content: center; align-items: flex-start;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #f5f5f0; border-radius: 12px;
      padding: 1.5rem; width: 100%; max-width: 600px;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .modal-title { font-size: 16px; font-weight: 500; }
    .btn-close { font-size: 18px; padding: 2px 10px; border: none; background: none; cursor: pointer; color: #888; }

    /* ===== トースト ===== */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #222; color: #fff; padding: 10px 24px;
      border-radius: 8px; font-size: 14px;
      opacity: 0; transition: opacity 0.3s; z-index: 200;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ===== パスワード画面 ===== */
    .pw-overlay {
      display: flex; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #f5f5f0;
      z-index: 300;
      justify-content: center; align-items: center;
    }
    .pw-overlay.hidden { display: none; }
    .pw-box {
      background: #fff; border: 1px solid #e0e0d8;
      border-radius: 14px; padding: 2.5rem 2rem;
      width: 100%; max-width: 340px;
      text-align: center;
    }
    .pw-title { font-size: 17px; font-weight: 500; color: #222; margin-bottom: 0.4rem; }
    .pw-sub { font-size: 12px; color: #aaa; margin-bottom: 1.75rem; }
    .pw-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ccc; border-radius: 8px;
      font-size: 16px; background: #fffbe6;
      text-align: center; letter-spacing: 4px;
      font-family: inherit; margin-bottom: 1rem;
    }
    .pw-input:focus { outline: 2px solid #aaa; }
    .pw-btn {
      width: 100%; background: #222; color: #fff;
      border: none; border-radius: 8px;
      padding: 11px; font-size: 14px; cursor: pointer;
      font-family: inherit;
    }
    .pw-btn:hover { background: #444; }
    .pw-error {
      font-size: 12px; color: #c00;
      margin-top: 0.75rem; min-height: 18px;
    }
  </style>
</head>
<body>

  <!-- ===== パスワード画面 ===== -->
  <div class="pw-overlay" id="pw-overlay">
    <div class="pw-box">
      <div class="pw-title">生産コストブレイク</div>
      <div class="pw-sub">パスワードを入力してください</div>
      <input class="pw-input" type="password" id="pw-input" placeholder="••••••"
        onkeydown="if(event.key==='Enter') checkPassword()">
      <button class="pw-btn" onclick="checkPassword()">ログイン</button>
      <div class="pw-error" id="pw-error"></div>
    </div>
  </div>

  <!-- ===== ヘッダー ===== -->
  <div class="header">
    <h1>生産コストブレイク</h1>
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="showScreen('register', this)">新規登録</button>
      <button class="tab-btn" onclick="showScreen('ledger', this)">原価台帳</button>
    </div>
  </div>

  <div class="content">

    <!-- ========== 画面①：新規登録 / 編集 ========== -->
    <div class="screen active" id="screen-register">

      <!-- 編集中バナー -->
      <div class="edit-banner" id="edit-banner">
        ✏️ 編集モード：内容を修正して「更新する」を押してください
      </div>

      <p class="note">※ 黄色の欄が入力箇所です</p>

      <!-- 製品名 -->
      <div class="section">
        <h2>製品名 / 作業全体の名称</h2>
        <div class="label">製品名（必須）</div>
        <input type="text" id="product-name" placeholder="例: ○○製品 製造工程">
      </div>

      <!-- 基本設定 -->
      <div class="section">
        <h2>基本設定</h2>
        <div class="label">原料名</div>
        <div style="margin-bottom:0.75rem;">
          <input type="text" id="material-name" placeholder="例: ○○原料">
        </div>
        <!-- 【入力】基本原料数（投入量 = 歩留まり計算の基準） -->
        <div class="label">基本原料数（投入量）</div>
        <div class="input-row">
          <input type="number" id="base-qty" min="0" step="0.1" placeholder="例: 100" oninput="calc()">
          <span class="unit">kg</span>
        </div>
      </div>

      <!-- 作業工程 -->
      <div class="section">
        <h2>作業工程（最大6工程）</h2>
        <div id="processes"></div>
        <button class="btn-add" onclick="addProcess()" id="add-btn">＋ 工程を追加</button>
        <hr class="divider">
        <div class="result">
          <div class="result-label">生産コスト合計</div>
          <div class="result-value" id="total">— 円/kg</div>
        </div>
      </div>

      <!-- ===== 完成品・歩留まりセクション ===== -->
      <div class="section">
        <h2>完成品 と 歩留まり</h2>
        <p style="font-size:12px;color:#888;margin-bottom:1rem;">
          各工程を経て得られた完成品を入力すると、歩留まりが自動計算されます
        </p>

        <!-- 完成品ブロックがここに追加される -->
        <div id="finished-products"></div>
        <button class="btn-add" onclick="addFinishedProduct()" id="add-fp-btn">＋ 完成品を追加</button>

        <hr class="divider">

        <!-- 歩留まり自動計算 -->
        <div class="yield-box">
          <div class="yield-row">
            <div class="yield-item">
              <div class="yield-label">投入量</div>
              <div class="yield-value" id="yield-input">—</div>
            </div>
            <div class="yield-item">
              <div class="yield-label">完成品合計</div>
              <div class="yield-value" id="yield-output">—</div>
            </div>
            <div class="yield-item">
              <div class="yield-label">ロス</div>
              <div class="yield-value" id="yield-loss">—</div>
            </div>
            <div class="yield-item">
              <div class="yield-label">歩留まり</div>
              <div class="yield-value" id="yield-rate">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 登録ボタン（新規 or 更新） -->
      <div id="form-buttons">
        <button class="btn-register" onclick="registerProduct()">この内容を登録する</button>
      </div>

    </div><!-- /screen-register -->


    <!-- ========== 画面②：原価台帳 ========== -->
    <div class="screen" id="screen-ledger">
      <h2 style="margin-bottom:1rem;">原価台帳</h2>
      <div id="ledger-list">
        <div class="ledger-empty">まだ登録されていません</div>
      </div>
    </div>

  </div><!-- /content -->


  <!-- ===== 詳細モーダル ===== -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">詳細</div>
        <button class="btn-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ===== トースト ===== -->
  <div class="toast" id="toast"></div>

  <script>
    // ===== パスワード認証 =====
    const CORRECT_PASSWORD = '1234'; // ← ここを変更してください

    function checkPassword() {
      const input = document.getElementById('pw-input').value;
      if (input === CORRECT_PASSWORD) {
        document.getElementById('pw-overlay').classList.add('hidden');
        sessionStorage.setItem('cba-auth', '1');
      } else {
        document.getElementById('pw-error').textContent = 'パスワードが違います';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }

    // セッション中は再入力不要
    if (sessionStorage.getItem('cba-auth') === '1') {
      document.getElementById('pw-overlay').classList.add('hidden');
    }

    // ===== 状態管理 =====
    let processCount = 0;
    let fpCount = 0;
    let editingId = null; // 編集中の登録ID（nullなら新規）

    // ===== タブ切り替え =====
    function showScreen(name, btn) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (name === 'ledger') renderLedger();
    }

    // ===== 工程追加 =====
    function addProcess() {
      if (processCount >= 6) return;
      processCount++;
      const id = processCount;
      const div = document.createElement('div');
      div.className = 'process-block';
      div.id = 'process-' + id;
      div.innerHTML = `
        <div class="process-title">
          <span>工程 ${id}　<span class="process-name-display" id="name-display-${id}"></span></span>
          <button class="btn-remove" onclick="removeProcess(${id})">削除</button>
        </div>
        <div class="label">工程名</div>
        <div style="margin-bottom:0.75rem;">
          <input type="text" id="process-name-${id}" placeholder="例: 洗浄・混合・加熱 など"
            oninput="document.getElementById('name-display-${id}').textContent = this.value ? '／ ' + this.value : ''">
        </div>
        <div class="label">作業者数</div>
        <div class="input-row">
          <input type="number" id="workers-${id}" min="0" step="1" placeholder="例: 3" oninput="calc()">
          <span class="unit">人</span>
        </div>
        <div class="label">作業時間</div>
        <div class="input-row">
          <input type="number" id="hours-${id}" min="0" step="0.1" placeholder="例: 8" oninput="calc()">
          <span class="unit">h</span>
        </div>
        <div class="label">基本賃金</div>
        <div class="input-row">
          <input type="number" id="wage-${id}" min="0" step="1" placeholder="例: 1000" oninput="calc()">
          <span class="unit">円/h</span>
        </div>
        <div class="cost-display">
          この工程の生産コスト：<span class="cost-value" id="cost-${id}">—</span>
        </div>
      `;
      document.getElementById('processes').appendChild(div);
      if (processCount >= 6) document.getElementById('add-btn').disabled = true;
      calc();
    }

    // ===== 工程削除 =====
    function removeProcess(id) {
      document.getElementById('process-' + id)?.remove();
      processCount = document.querySelectorAll('.process-block').length;
      document.getElementById('add-btn').disabled = false;
      calc();
    }

    // ===== 完成品追加 =====
    function addFinishedProduct() {
      fpCount++;
      const id = fpCount;
      const div = document.createElement('div');
      div.className = 'product-block';
      div.id = 'fp-' + id;
      div.innerHTML = `
        <div class="product-title">
          <span>完成品 ${id}</span>
          <button class="btn-remove" onclick="removeFinishedProduct(${id})">削除</button>
        </div>
        <!-- 【入力】完成品名 -->
        <div class="label">完成品名</div>
        <div style="margin-bottom:0.75rem;">
          <input type="text" id="fp-name-${id}" placeholder="例: ○○製品A">
        </div>
        <!-- 【入力】完成品量 -->
        <div class="label">完成品量</div>
        <div class="input-row">
          <input type="number" id="fp-qty-${id}" min="0" step="0.1" placeholder="例: 50" oninput="calcYield()">
          <span class="unit">kg</span>
        </div>
      `;
      document.getElementById('finished-products').appendChild(div);
      calcYield();
    }

    // ===== 完成品削除 =====
    function removeFinishedProduct(id) {
      document.getElementById('fp-' + id)?.remove();
      calcYield();
    }

    // ===== コスト計算（作業者数 × 作業時間 × 基本賃金 ÷ 基本原料数） =====
    function calc() {
      const baseQty = parseFloat(document.getElementById('base-qty').value);
      let total = 0;
      document.querySelectorAll('.process-block').forEach(block => {
        const id = block.id.split('-')[1];
        const w  = parseFloat(document.getElementById('workers-' + id)?.value);
        const h  = parseFloat(document.getElementById('hours-'   + id)?.value);
        const wg = parseFloat(document.getElementById('wage-'    + id)?.value);
        const costEl = document.getElementById('cost-' + id);
        if (w > 0 && h > 0 && wg > 0 && baseQty > 0) {
          const cost = (w * h * wg) / baseQty;
          costEl.textContent = cost.toFixed(2) + ' 円/kg';
          total += cost;
        } else {
          costEl.textContent = '—';
        }
      });
      document.getElementById('total').textContent = total > 0 ? total.toFixed(2) + ' 円/kg' : '— 円/kg';
      calcYield();
      return total;
    }

    // ===== 歩留まり計算 =====
    function calcYield() {
      const baseQty = parseFloat(document.getElementById('base-qty').value) || 0;
      let outputTotal = 0;
      document.querySelectorAll('.product-block').forEach(block => {
        const id = block.id.split('-')[1];
        const qty = parseFloat(document.getElementById('fp-qty-' + id)?.value) || 0;
        outputTotal += qty;
      });

      document.getElementById('yield-input').textContent  = baseQty > 0 ? baseQty.toFixed(1) + ' kg' : '—';
      document.getElementById('yield-output').textContent = outputTotal > 0 ? outputTotal.toFixed(1) + ' kg' : '—';

      if (baseQty > 0 && outputTotal > 0) {
        const loss = baseQty - outputTotal;
        const rate = (outputTotal / baseQty) * 100;
        document.getElementById('yield-loss').textContent = loss.toFixed(1) + ' kg';
        document.getElementById('yield-rate').textContent = rate.toFixed(1) + ' %';
      } else {
        document.getElementById('yield-loss').textContent = '—';
        document.getElementById('yield-rate').textContent = '—';
      }
    }

    // ===== 完成品データ収集 =====
    function collectFinishedProducts() {
      const fps = [];
      document.querySelectorAll('.product-block').forEach(block => {
        const id = block.id.split('-')[1];
        fps.push({
          name: document.getElementById('fp-name-' + id)?.value || '',
          qty:  parseFloat(document.getElementById('fp-qty-'  + id)?.value) || 0,
        });
      });
      return fps;
    }

    // ===== 工程データ収集 =====
    function collectProcesses() {
      const processes = [];
      document.querySelectorAll('.process-block').forEach(block => {
        const id = block.id.split('-')[1];
        processes.push({
          name:    document.getElementById('process-name-' + id)?.value || '',
          workers: parseFloat(document.getElementById('workers-' + id)?.value) || 0,
          hours:   parseFloat(document.getElementById('hours-'   + id)?.value) || 0,
          wage:    parseFloat(document.getElementById('wage-'    + id)?.value) || 0,
        });
      });
      return processes;
    }

    // ===== 登録（新規） =====
    function registerProduct() {
      const productName = document.getElementById('product-name').value.trim();
      if (!productName) { alert('製品名を入力してください'); return; }
      const baseQty = parseFloat(document.getElementById('base-qty').value);
      if (!baseQty || baseQty <= 0) { alert('基本原料数を入力してください'); return; }

      const fps = collectFinishedProducts();
      const outputTotal = fps.reduce((s, f) => s + f.qty, 0);
      const yieldRate = baseQty > 0 && outputTotal > 0 ? (outputTotal / baseQty) * 100 : null;

      const data = {
        id: Date.now(),
        productName,
        materialName: document.getElementById('material-name').value,
        baseQty,
        processes: collectProcesses(),
        finishedProducts: fps,
        outputTotal,
        yieldRate,
        totalCost: calc(),
        registeredAt: new Date().toLocaleString('ja-JP'),
        updatedAt: null,
      };

      const existing = JSON.parse(localStorage.getItem('costbreak-data') || '[]');
      existing.push(data);
      localStorage.setItem('costbreak-data', JSON.stringify(existing));
      showToast('「' + productName + '」を登録しました！');
      resetForm();
    }

    // ===== 更新（編集後） =====
    function updateProduct() {
      const productName = document.getElementById('product-name').value.trim();
      if (!productName) { alert('製品名を入力してください'); return; }
      const baseQty = parseFloat(document.getElementById('base-qty').value);
      if (!baseQty || baseQty <= 0) { alert('基本原料数を入力してください'); return; }

      const fps = collectFinishedProducts();
      const outputTotal = fps.reduce((s, f) => s + f.qty, 0);
      const yieldRate = baseQty > 0 && outputTotal > 0 ? (outputTotal / baseQty) * 100 : null;

      let existing = JSON.parse(localStorage.getItem('costbreak-data') || '[]');
      const idx = existing.findIndex(d => d.id === editingId);
      if (idx === -1) { alert('更新対象が見つかりません'); return; }

      existing[idx] = {
        ...existing[idx],
        productName,
        materialName: document.getElementById('material-name').value,
        baseQty,
        processes: collectProcesses(),
        finishedProducts: fps,
        outputTotal,
        yieldRate,
        totalCost: calc(),
        updatedAt: new Date().toLocaleString('ja-JP'),
      };

      localStorage.setItem('costbreak-data', JSON.stringify(existing));
      showToast('「' + productName + '」を更新しました！');
      resetForm();
    }

    // ===== 編集モードに切り替え =====
    function editItem(id) {
      const data = JSON.parse(localStorage.getItem('costbreak-data') || '[]');
      const item = data.find(d => d.id === id);
      if (!item) return;

      // 登録画面に切り替え
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-register').classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[0].classList.add('active');

      // フォームリセット後に値をセット
      resetForm(false);
      editingId = id;

      document.getElementById('product-name').value  = item.productName;
      document.getElementById('material-name').value = item.materialName || '';
      document.getElementById('base-qty').value       = item.baseQty;

      // 工程を復元
      document.getElementById('processes').innerHTML = '';
      processCount = 0;
      document.getElementById('add-btn').disabled = false;
      item.processes.forEach(p => {
        addProcess();
        const pid = processCount;
        document.getElementById('process-name-' + pid).value = p.name;
        document.getElementById('name-display-'  + pid).textContent = p.name ? '／ ' + p.name : '';
        document.getElementById('workers-' + pid).value = p.workers;
        document.getElementById('hours-'   + pid).value = p.hours;
        document.getElementById('wage-'    + pid).value = p.wage;
      });

      // 完成品を復元
      document.getElementById('finished-products').innerHTML = '';
      fpCount = 0;
      (item.finishedProducts || []).forEach(fp => {
        addFinishedProduct();
        const fid = fpCount;
        document.getElementById('fp-name-' + fid).value = fp.name;
        document.getElementById('fp-qty-'  + fid).value = fp.qty;
      });

      calc();
      calcYield();

      // 編集バナーとボタン切り替え
      document.getElementById('edit-banner').classList.add('show');
      document.getElementById('form-buttons').innerHTML = `
        <button class="btn-update" onclick="updateProduct()">✏️ 更新する</button>
        <button class="btn-cancel" onclick="cancelEdit()">キャンセル</button>
      `;
    }

    // ===== 編集キャンセル =====
    function cancelEdit() {
      resetForm();
    }

    // ===== フォームリセット =====
    function resetForm(resetEditId = true) {
      document.getElementById('product-name').value  = '';
      document.getElementById('material-name').value = '';
      document.getElementById('base-qty').value      = '';
      document.getElementById('processes').innerHTML = '';
      document.getElementById('finished-products').innerHTML = '';
      document.getElementById('total').textContent = '— 円/kg';
      document.getElementById('yield-input').textContent  = '—';
      document.getElementById('yield-output').textContent = '—';
      document.getElementById('yield-loss').textContent   = '—';
      document.getElementById('yield-rate').textContent   = '—';
      processCount = 0;
      fpCount = 0;
      document.getElementById('add-btn').disabled = false;
      document.getElementById('edit-banner').classList.remove('show');
      document.getElementById('form-buttons').innerHTML =
        `<button class="btn-register" onclick="registerProduct()">この内容を登録する</button>`;
      if (resetEditId) editingId = null;
      addProcess();
    }

    // ===== 台帳描画 =====
    function renderLedger() {
      const list = document.getElementById('ledger-list');
      const data = JSON.parse(localStorage.getItem('costbreak-data') || '[]');
      if (data.length === 0) {
        list.innerHTML = '<div class="ledger-empty">まだ登録されていません</div>';
        return;
      }
      list.innerHTML = [...data].reverse().map(item => {
        const yieldStr = item.yieldRate != null ? '歩留まり：' + item.yieldRate.toFixed(1) + '%' : '';
        const updatedStr = item.updatedAt ? '　更新：' + item.updatedAt : '';
        return `
          <div class="ledger-item">
            <div class="ledger-item-left">
              <div class="ledger-product-name">${item.productName}</div>
              <div class="ledger-meta">原料：${item.materialName || '—'} ／ 投入：${item.baseQty}kg</div>
              <div class="ledger-cost">${item.totalCost.toFixed(2)} 円/kg</div>
              ${yieldStr ? '<div class="ledger-yield">' + yieldStr + '</div>' : ''}
              <div class="ledger-date">登録：${item.registeredAt}${updatedStr}</div>
            </div>
            <div class="ledger-item-right">
              <button class="btn-view"      onclick="viewDetail(${item.id})">詳細</button>
              <button class="btn-edit-item" onclick="editItem(${item.id})">編集</button>
              <button class="btn-delete"    onclick="deleteItem(${item.id})">削除</button>
            </div>
          </div>`;
      }).join('');
    }

    // ===== 詳細モーダル =====
    function viewDetail(id) {
      const data = JSON.parse(localStorage.getItem('costbreak-data') || '[]');
      const item = data.find(d => d.id === id);
      if (!item) return;
      document.getElementById('modal-title').textContent = item.productName;

      const processHTML = item.processes.map((p, i) => {
        const cost = item.baseQty > 0 ? (p.workers * p.hours * p.wage) / item.baseQty : 0;
        return `
          <div class="process-block" style="margin-bottom:0.5rem;">
            <div style="font-size:14px;font-weight:500;margin-bottom:0.5rem;">
              工程${i+1}${p.name ? '　／　' + p.name : ''}
            </div>
            <div style="font-size:13px;color:#666;line-height:2;">
              作業者数：${p.workers}人　／　作業時間：${p.hours}h　／　基本賃金：${p.wage}円/h
            </div>
            <div class="cost-display">
              この工程の生産コスト：<span class="cost-value">${cost.toFixed(2)} 円/kg</span>
            </div>
          </div>`;
      }).join('');

      const fpHTML = (item.finishedProducts || []).length > 0 ? `
        <div class="section" style="margin-bottom:0.75rem;">
          <h2>完成品</h2>
          ${item.finishedProducts.map((fp, i) => `
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:14px;">
              <span>${fp.name || '完成品' + (i+1)}</span>
              <span>${fp.qty} kg</span>
            </div>`).join('')}
          <div class="yield-box" style="margin-top:0.75rem;">
            <div class="yield-row">
              <div class="yield-item">
                <div class="yield-label">投入量</div>
                <div class="yield-value">${item.baseQty} kg</div>
              </div>
              <div class="yield-item">
                <div class="yield-label">完成品合計</div>
                <div class="yield-value">${item.outputTotal.toFixed(1)} kg</div>
              </div>
              <div class="yield-item">
                <div class="yield-label">ロス</div>
                <div class="yield-value">${(item.baseQty - item.outputTotal).toFixed(1)} kg</div>
              </div>
              <div class="yield-item">
                <div class="yield-label">歩留まり</div>
                <div class="yield-value">${item.yieldRate != null ? item.yieldRate.toFixed(1) + ' %' : '—'}</div>
              </div>
            </div>
          </div>
        </div>` : '';

      document.getElementById('modal-body').innerHTML = `
        <div class="section" style="margin-bottom:0.75rem;">
          <div class="label">原料名</div>
          <div style="font-size:14px;margin-bottom:0.75rem;">${item.materialName || '—'}</div>
          <div class="label">基本原料数（投入量）</div>
          <div style="font-size:14px;">${item.baseQty} kg</div>
        </div>
        ${processHTML}
        <div class="result">
          <div class="result-label">生産コスト合計</div>
          <div class="result-value">${item.totalCost.toFixed(2)} 円/kg</div>
        </div>
        ${fpHTML}`;

      document.getElementById('modal-overlay').classList.add('open');
    }

    // ===== モーダルを閉じる =====
    function closeModal(e) {
      if (e.target === document.getElementById('modal-overlay'))
        document.getElementById('modal-overlay').classList.remove('open');
    }
    function closeModalDirect() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    // ===== 削除 =====
    function deleteItem(id) {
      if (!confirm('この登録を削除しますか？')) return;
      let data = JSON.parse(localStorage.getItem('costbreak-data') || '[]');
      data = data.filter(d => d.id !== id);
      localStorage.setItem('costbreak-data', JSON.stringify(data));
      renderLedger();
    }

    // ===== トースト =====
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== 起動時 =====
    addProcess();
  </script>

</body>
</html>
